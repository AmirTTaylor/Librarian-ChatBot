<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BookWorm | Signup</title>
        <link rel = "stylesheet" href = "../css/styles.css">
    </head>
    <body>
        <!-- Page Heading -->
        <div class = "page-heading">
            <!--Header-->
            <h1 class = "headings">Create an Account!</h1>
        </div>

        <!-- Account Info-->
        <div>
            <label for = "fname">First Name</label>
            <input type = "text" name = "fname" class = "textbox">
            <br>
            <label for = "lname">Last Name</label>
            <input type = "text" name = "lname" class = "textbox">
            <br>
            <label for = "uname">Username</label>
            <input type = "text" name = "uname" class = "textbox">
            <br>
            <label for = "pass">Password</label>
            <input type = "text" name = "pass" class = "textbox">
            <br>
            <label for = "cpass">Confirm Password</label>
            <input type = "text" name = "cpass" class = "textbox">
            <br>
            <!--Submission Button-->
            <a href = "login.html">
                <button class = "buttons">Create Your Account</button>
            </a>
        </div>
    </body>
</html>
